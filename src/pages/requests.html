<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" width="device-width initial-scale=1.0">

        <title>Requests List</title>

        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/requests.css">
    </head>
    <body>
    <header class="navbar">
        <div class="logo">
            <h1>Request Tracker</h1>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="/submit">Submit</a></li>
            </ul>
        </nav>
    </header>
    <main class="requests-page">
        <section class="request-container">
            <div class="page-header">
                <div>
                    <h2>View all submitted requests here.</h2>
                    <p>Track the progress of every request.</p>
                </div>

                <a href="/submit" class="btn btn-primary">+ New Request</a>
            </div>
            
            <div class="controls" style="display:flex;gap:8px;align-items:center;margin:14px 0;flex-wrap:wrap">
                <input id="search-input" type="search" placeholder="Search requests by name, email, product, or message" aria-label="Search requests" style="padding:8px;border-radius:6px;border:1px solid #ccc;min-width:220px;">

                <select id="status-filter" aria-label="Filter by status" style="padding:8px;border-radius:6px;border:1px solid #ccc;">
                    <option value="">All statuses</option>
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="In-Progress">In-Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Closed">Closed</option>
                </select>

                <select id="product-filter" aria-label="Filter by product" style="padding:8px;border-radius:6px;border:1px solid #ccc;">
                    <option value="">All products</option>
                </select>

                <select id="sort-select" aria-label="Sort by date" style="padding:8px;border-radius:6px;border:1px solid #ccc;">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                </select>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Product</th>
                            <th>Type</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="request-table-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div>
            <p>Let's work together to build better products.</p>
        </div>
        <div class="footer-links">
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">X</a>
        </div>
    </footer>
    <script type="module" src="../js/app.js"></script>
    </body>

</html>
